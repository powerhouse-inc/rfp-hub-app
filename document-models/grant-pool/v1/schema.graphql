type GrantPoolState {
  # DAOIP-5 canonical (hub added FK to grant-system)
  grantSystemRef: PHID
  name: String
  description: String
  grantFundingMechanism: FundingMechanism
  isOpen: Boolean!
  openDate: DateTime
  closeDate: DateTime
  applicationsURI: URL
  governanceURI: URL
  attestationIssuersURI: URL
  requiredCredentials: [String!]!
  totalGrantPoolSize: [FundingAmount!]!
  totalGrantPoolSizeInUSD: Amount_Fiat
  minGrant: [FundingAmount!]!
  maxGrant: [FundingAmount!]!
  email: EmailAddress
  image: URL
  coverImage: URL
  extensions: String

  # schema.org addition
  sameAs: [URL!]!

  # network-admin inspired
  code: String
  briefingURI: URL
  eligibilityCriteria: String
  evaluationCriteria: String
  contextDocuments: [ContextDocument!]!
  reviewers: [Reviewer!]!

  # RFP filter dimensions
  categories: [String!]!
  ecosystems: [String!]!
  tags: [String!]!

  # Richer lifecycle (projects losslessly to DAOIP-5 isOpen)
  lifecycle: GrantPoolLifecycle!

  # Hub provenance
  submitter: Submitter
  publisher: Publisher
  lastVerifiedAt: DateTime
  verificationMethod: VerificationMethod
  verifiedBy: String

  # Hub governance state
  governanceState: PoolGovernanceState!

  # Lineage
  supersedes: PHID
  claimedFromEntry: PHID
  duplicateOf: PHID
}

enum FundingMechanism {
  DIRECT_GRANTS
  QUADRATIC_FUNDING
  STREAMING_QUADRATIC_FUNDING
  RETRO_FUNDING
  CONVICTION_VOTING
  SELF_CURATED_REGISTRIES
  GIFT_CIRCLES
  SOCIAL_MEDIA_CAPITAL_ALLOCATION
  FUTARCHY
  ASSURANCE_CONTRACTS
  COOKIE_JAR
  IMPACT_ATTESTATIONS
  STOKVEL
  REQUEST_FOR_PROPOSAL
  DELEGATED_DOMAIN_ALLOCATION
  EVOLUTIONARY_GRANTS_GAMES
  DIRECT_TO_CONTRACT_INCENTIVES
  ANGEL_INVESTMENT
  DOMINANT_ASSURANCE_CONTRACTS
  COMMUNITY_CURRENCIES
  UNIVERSAL_BASIC_INCOME
  BOUNTIES
  GNOSIS_SAFE
  WAQF
  RANKED_CHOICE_VOTING
  HONOUR
  MUTUAL_AID_NETWORKS
  BONDING_CURVES
  ZAKAT
  DECENTRALIZED_VALIDATORS
  REVNETS
  OTHER
}

enum GrantPoolLifecycle {
  DRAFT
  REQUEST_FOR_COMMENTS
  UPCOMING
  OPEN
  CLOSED
  AWARDED
  NOT_AWARDED
  CANCELLED
}

enum PoolGovernanceState {
  PENDING
  UNDER_REVIEW
  APPROVED
  REJECTED
  DISPUTED
  SUPERSEDED
}

enum SubmitterType {
  COMMUNITY
  VERIFIED_PUBLISHER
  AUTOMATION
}

enum VerificationMethod {
  MANUAL_REVIEW
  DOMAIN_VERIFICATION
  HTTP_PROBE
  REVIEWER_CONFIRMATION
}

enum ReviewerScope {
  INTERNAL
  EXTERNAL
}

enum ReviewerType {
  HUMAN
  GROUP
  AI
}

type Submitter {
  type: SubmitterType!
  identifier: String!
  submittedAt: DateTime!
}

type Publisher {
  identifier: String!
  publishedAt: DateTime!
}

type FundingAmount {
  id: OID!
  amount: Amount!
}

type ContextDocument {
  id: OID!
  name: String!
  url: URL!
}

type Reviewer {
  id: OID!
  did: String!
  scope: ReviewerScope!
  reviewerType: ReviewerType!
  name: String!
}


